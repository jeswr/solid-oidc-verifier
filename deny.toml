# cargo-deny configuration (advisory in M1; wired into CI as a non-blocking lane).
#
# Cargo has no install-time hooks (unlike npm), but `build.rs` + proc-macros run arbitrary code at
# BUILD time with no blanket disable — the cargo analogue of npm's ignore-scripts risk. cargo-deny
# (advisories + bans + sources + licenses) is the governance for that build-time surface. See the
# README "supply chain" note.

[advisories]
# RustSec advisory DB. Fail on a vulnerability; warn on unmaintained/unsound until triaged.
version = 2
yanked = "warn"
ignore = [
  # The RSA crate's Marvin timing side-channel (RUSTSEC-2023-0071) is dodged by using the
  # `aws-lc-rs` jsonwebtoken backend, NOT the rsa crate, for verification. The `rsa` crate appears
  # only as a DEV-dependency (test-only RS256 key generation), never in the verification path.
]

[licenses]
version = 2
# Permissive licenses acceptable for an MIT-OR-Apache-2.0 crate.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "OpenSSL",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
